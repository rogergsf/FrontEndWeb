<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Expression with AngularJS</title>
</head>

<body>
    <h2>Example of Mathematical Expression with AngularJS</h2>
    <!-- Div with ng-app directive -->
    <div ng-app="">
        <!-- Paragraph displaying the value of the expression -->
        <p>The result is: {{ 10 + 10 }}</p>
    </div>

    <!-- Linking AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.3/angular.min.js"></script>
</body>

</html>
