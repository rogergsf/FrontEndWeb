<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Input with AngularJS</title>
</head>

<body>
    <h2>Enter Text to Display in a Header</h2>
    <!-- Div with ng-app directive -->
    <div ng-app="">
        <!-- Input field with ng-model directive -->
        <input type="text" ng-model="name" placeholder="Enter your name">
        <!-- Header displaying the entered text -->
        <h1>Hello, {{name}}</h1>
    </div>

    <!-- Linking AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.3/angular.min.js"></script>
</body>

</html>
